<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stratos Office — Interactive Flow Map</title>
<style>
  :root {
    --bg: #0b1a2e;
    --surface: #122d4a;
    --primary: #00d4ff;
    --primary-dim: #3cd7ff;
    --secondary: #6fffe8;
    --on-bg: #d2e4ff;
    --on-surface: #bbc9cf;
    --outline: #6b8a9e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--on-bg); display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #panel {
    width: 320px; min-width: 320px;
    background: rgba(4,32,59,0.6);
    border-right: 1px solid rgba(255,255,255,0.06);
    padding: 1rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  #panel h1 {
    font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--primary); margin-bottom: 0.5rem; padding-bottom: 0.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; gap: 0.4rem;
  }
  #panel h1 small { font-weight: 400; font-size: 0.55rem; color: var(--outline); letter-spacing: 0; text-transform: none; margin-left: auto; }
  .flow-btn {
    display: flex; align-items: center; gap: 0.5rem; padding: 0.45rem 0.6rem;
    border-radius: 8px; cursor: pointer; transition: all 0.15s;
    font-size: 0.75rem; border: 1px solid transparent; background: transparent;
    color: var(--on-surface); text-align: left; width: 100%; font-family: inherit; line-height: 1.3;
  }
  .flow-btn:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
  .flow-btn.active { background: rgba(0,212,255,0.08); border-color: var(--primary); color: var(--on-bg); }
  .flow-btn .icon { font-size: 1rem; flex-shrink: 0; }
  .flow-btn .label { font-weight: 600; font-size: 0.75rem; display: block; }
  .flow-btn .desc { font-size: 0.6rem; color: var(--outline); display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Canvas */
  #canvas { flex: 1; position: relative; overflow: hidden; }
  #svg { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
  #svg path.flow-link { fill: none; stroke-width: 2.5; stroke-linecap: round; opacity: 0; transition: opacity 0.45s, stroke-dashoffset 1s; }
  #svg path.flow-link.vis { opacity: 1; }
  #svg text.flow-label { font-size: 6.5px; fill: #d2e4ff; opacity: 0; transition: opacity 0.6s; }
  #svg text.flow-label.vis { opacity: 1; }

  /* Nodes */
  #nodes { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .node {
    position: absolute; padding: 0.4rem 0.6rem; border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(18,45,74,0.88); backdrop-filter: blur(6px);
    font-size: 0.6rem; cursor: default; transition: all 0.3s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    pointer-events: auto;
  }
  .node .ni { font-size: 0.85rem; margin-bottom: 0.1rem; }
  .node .nn { font-weight: 600; color: var(--on-bg); font-size: 0.62rem; line-height: 1.2; }
  .node .nt { font-size: 0.5rem; color: var(--outline); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.08rem; }
  .node.highlight { border-color: var(--primary); box-shadow: 0 0 14px rgba(0,212,255,0.2), 0 2px 8px rgba(0,0,0,0.3); }
  .node.dim { opacity: 0.25; }
  .node.layer-label {
    background: transparent; border: none; backdrop-filter: none;
    box-shadow: none; pointer-events: none; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.15em; font-size: 0.55rem;
    color: rgba(107,138,158,0.4); padding: 0.2rem 0;
  }

  /* Annotation box */
  #ann {
    position: absolute; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
    max-width: 750px; width: 92%;
    background: rgba(4,32,59,0.94); backdrop-filter: blur(12px);
    border: 1px solid rgba(0,212,255,0.15); border-radius: 10px;
    padding: 0.7rem 1rem; font-size: 0.72rem; color: var(--on-bg);
    opacity: 0; transition: opacity 0.4s; pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 20;
    max-height: 38vh; overflow-y: auto;
  }
  #ann.vis { opacity: 1; }
  #ann .at { font-weight: 700; color: var(--primary); margin-bottom: 0.25rem; font-size: 0.8rem; }
  #ann .ad { color: var(--outline); font-size: 0.65rem; margin-bottom: 0.4rem; }
  #ann .as { display: flex; align-items: flex-start; gap: 0.4rem; margin: 0.15rem 0; }
  #ann .aa { color: var(--secondary); font-size: 0.6rem; margin-top: 0.12rem; flex-shrink: 0; }
  #ann .atxt { color: var(--on-surface); font-size: 0.65rem; line-height: 1.35; }
  #ann .atxt strong { font-weight: 600; }

  #empty {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    text-align: center; color: var(--outline); font-size: 0.8rem; line-height: 1.6;
    pointer-events: none;
  }
  #empty .bi { font-size: 2.2rem; margin-bottom: 0.4rem; }
  #empty .t { font-weight: 600; color: var(--on-surface); font-size: 0.9rem; }

  /* Scrollbar */
  #panel::-webkit-scrollbar, #ann::-webkit-scrollbar { width: 4px; }
  #panel::-webkit-scrollbar-thumb, #ann::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
</style>
</head>
<body>

<div id="panel"></div>

<div id="canvas">
  <svg id="svg"></svg>
  <div id="nodes"></div>
  <div id="ann"></div>
  <div id="empty">
    <div class="bi">↗️</div>
    <div class="t">Pick a flow from the sidebar</div>
    <div>Each flow traces how data moves between<br/>components to complete a user action.</div>
  </div>
</div>

// =============================================================
// NODE LAYOUT
// =============================================================
const LAYER_LABELS = ["Entry & Shell","State Providers","Pages & Drawers","Layout & Nav","Workspaces","Output Renderers","Logic Layer","Media Layer","Inference Engine","Stores & Services","External APIs"];

const nodeMap = {};
DATA.nodes.forEach(n => { nodeMap[n.id] = n; });

const COLS = [[1,2,3],[1,2],[1,2,3,4,5],[1,2],[1,2,3,4,5,6],[1,2,3,4,5,6],[1,2,3,4,5,6],[1,2],[1],[1,2,3,4],[1,2,3]];

const NODE_H = 48;
const GAP_X = 18;
const GAP_Y = 10;
const COL_W = NODE_W + GAP_X;
const ROW_H = NODE_H + GAP_Y;
const LAYER_H = 22;

function getNodePos(id) {
  const n = nodeMap[id];
  if (!n) return null;
  const layer = n.layer;
  const colGroup = COLS[layer];
  let colIndex = -1;
  // Count nodes in this layer to assign column
  const layerNodes = DATA.nodes.filter(x => x.layer === layer);
  const idx = layerNodes.indexOf(n);
  // We'll handle this differently - find position by matching col from data
  // Actually, let's just position based on the col field already in the data
  return null; // handled below
}

// Simple grid layout: each layer has nodes positioned left-to-right
const layout = {};
const layers = {};
DATA.nodes.forEach(n => {
  if (!layers[n.layer]) layers[n.layer] = [];
  layers[n.layer].push(n);
});

Object.keys(layers).sort((a,b) => a-b).forEach(layer => {
  const nodes = layers[layer];
  nodes.forEach((n, i) => {
    layout[n.id] = {
      x: 30 + i * COL_W,
      y: 20 + parseInt(layer) * (ROW_H + LAYER_H + 8) + LAYER_H + 4,
      w: NODE_W,
      h: NODE_H
    };
  });
});

// =============================================================
// RENDER NODES

const svg = document.getElementById('svg');
const NS = svg.namespaceURI;

const NODE_COLORS = {
  entry: 'rgba(60,215,255,0.12)',
  shell: 'rgba(111,255,232,0.1)',
  context: 'rgba(251,191,36,0.1)',
  page: 'rgba(96,165,250,0.1)',

  layout: 'rgba(244,114,182,0.1)',
  workspace: 'rgba(111,255,232,0.08)',
  renderer: 'rgba(251,191,36,0.08)',
  logic: 'rgba(167,139,250,0.12)',
  media: 'rgba(251,146,60,0.12)',
  engine: 'rgba(255,107,107,0.12)',
  store: 'rgba(96,165,250,0.08)',

};

  shell: 'rgba(111,255,232,0.35)',
  context: 'rgba(251,191,36,0.35)',
  page: 'rgba(96,165,250,0.35)',
  panel: 'rgba(96,165,250,0.25)',
  layout: 'rgba(244,114,182,0.35)',
  workspace: 'rgba(111,255,232,0.25)',
  renderer: 'rgba(251,191,36,0.25)',

// =============================================================
// EDGE DRAWING
// =============================================================
function center(id) {
  const p = layout[id];
  if (!p) return null;
  return { x: p.x + p.w/2, y: p.y + p.h/2 };
}

function getAnchors(fromId, toId) {
  const f = center(fromId);
  const t = center(toId);
  if (!f || !t) return null;
  const pf = layout[fromId];
  const pt = layout[toId];
  const dx = t.x - f.x;
  const dy = t.y - f.y;

  let fx, fy, tx, ty;
  if (Math.abs(dx) > Math.abs(dy)) {
    fx = f.x + pf.w/2; fy = f.y;
    tx = t.x - pt.w/2; ty = t.y;
  } else {
    fx = f.x; fy = f.y + pf.h/2;
    tx = t.x; ty = t.y - pt.h/2;
  }

  return { fx, fy, tx, ty, cx1: fx + (tx-fx)*0.35, cy1: fy, cx2: tx - (tx-fx)*0.35, cy2: ty };
}

function drawEdge(fromId, toId, color, cls) {
  const a = getAnchors(fromId, toId);
  if (!a) return null;
  const p = document.createElementNS(NS, 'path');
  p.setAttribute('d', `M ${a.fx} ${a.fy} C ${a.cx1} ${a.cy1}, ${a.cx2} ${a.cy2}, ${a.tx} ${a.ty}`);
  p.setAttribute('class', 'flow-link ' + cls);
  p.style.stroke = color;
  return p;
}

function drawLabel(fromId, toId, text, color, cls, idx) {
  const a = getAnchors(fromId, toId);
  if (!a) return null;
  const mx = (a.fx + a.tx) / 2;
  const my = (a.fy + a.ty) / 2 - 10 - idx * 13;
  const t = document.createElementNS(NS, 'text');
  t.setAttribute('x', mx);
  t.setAttribute('y', my);
  t.setAttribute('text-anchor', 'middle');
  t.setAttribute('class', 'flow-label ' + cls);
  t.style.fill = color;
  t.textContent = text;
  return t;
}

// =============================================================
// FLOW SELECTION
// =============================================================
let currentEls = [];

function selectFlow(id) {
  currentEls.forEach(el => { if (el.parentNode) el.parentNode.removeChild(el); });
  currentEls = [];
  document.querySelectorAll('.flow-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('empty').style.display = 'none';
  document.getElementById('ann').classList.remove('vis');

  document.querySelectorAll('.node').forEach(el => el.classList.remove('highlight','dim'));

  const flow = DATA.flows.find(f => f.id === id);
  if (!flow) return;

  document.querySelector(`[data-fid="${id}"]`).classList.add('active');

  const flowNodes = new Set(flow.nodes);
  document.querySelectorAll('.node').forEach(el => {
    const nid = el.id.replace('n-','');
    if (flowNodes.has(nid)) el.classList.add('highlight');
    else el.classList.add('dim');
  });

  const cls = 'fl-' + id;
  flow.edges.forEach((edge, i) => {
    const color = flow.color || '#00d4ff';
    const p = drawEdge(edge.from, edge.to, color, cls);
    if (p) { svg.appendChild(p); currentEls.push(p); requestAnimationFrame(() => p.classList.add('vis')); }

    const l = drawLabel(edge.from, edge.to, edge.a, color, cls, i);
    if (l) { svg.appendChild(l); currentEls.push(l); requestAnimationFrame(() => l.classList.add('vis')); }
  });

  const ann = document.getElementById('ann');
  let html = `<div class="at">${flow.icon} ${flow.label}</div><div class="ad">${flow.desc}</div>`;
  flow.edges.forEach((edge, i) => {
    const c = flow.color || '#00d4ff';
    html += `<div class="as"><span class="aa" style="color:${c}">▸</span><span class="atxt"><strong style="color:${c}">${edge.from}</strong> → <strong style="color:${c}">${edge.to}</strong>: ${edge.a}</span></div>`;
  });
  ann.innerHTML = html;
  requestAnimationFrame(() => ann.classList.add('vis'));
}
